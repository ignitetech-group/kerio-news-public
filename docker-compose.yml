version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_USER=kerio_user
      - DB_PASSWORD=kerio_password
      - DB_NAME=kerio_news
      - NODE_ENV=production
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: kerio_news
      POSTGRES_USER: kerio_user
      POSTGRES_PASSWORD: kerio_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kerio_user -d kerio_news"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
